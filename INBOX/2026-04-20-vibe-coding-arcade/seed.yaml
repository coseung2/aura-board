  # phase3 decisions.md §3 U-1~U-4
  - id: U-1
    item: 모더레이션 정책 초기값
    default: teacher_approval_required
    confirm_by: "padlet phase0 request.json 작성 전"
    field: VibeArcadeConfig.moderationPolicy
    rationale: "R-2 극심 리스크 최종 방어선. 자동 게시(B)는 사고 리스크↑, 하이브리드(C)는 v1.5 신뢰 등급 필요. 교사 부담 90건/주는 R-7 완화(자동 1차 필터+키보드 단축키)로 분산"
