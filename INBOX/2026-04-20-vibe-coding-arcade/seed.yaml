    confirm_by: "UX 와이어프레임 최종화 전"
    field: VibeArcadeConfig.reviewAuthorDisplay
    rationale: "R-10 악성 리뷰 완화 — 실명 책임. Scratch Teacher Account 관례. 익명(B)은 악성 유인, hidden_to_peer(C)는 설계 복잡 v1.5"
