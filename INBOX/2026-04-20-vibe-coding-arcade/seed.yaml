goal: |
  Aura-board 교사 계정에 상시 잉여 상태인 Claude Sonnet 전용 API 쿼터를, 학생이
  Sonnet과 대화하며 브라우저 실행 가능한 게임·퀴즈·미니앱을 바이브 코딩으로
  제작하고 반 친구들이 그 결과물을 플레이·평가하는 "학급 Steam" 공간으로 전환한다.
  신규 레이아웃(`Board.layout="vibe-arcade"`) 1개와 도메인 엔티티 6종(`VibeArcadeConfig`
  · `VibeProject` · `VibeSession` · `VibeReview` · `VibePlaySession` · `VibeQuotaLedger`)을
  도입하고, Seed 12 LLM 프로바이더 추상화에 `anthropic-sonnet.ts`를 추가해 쿼터
  낭비 해소 · AI 리터러시 실습 · 학급 내 생산자-소비자 상호작용 루프를 동시 달성한다.

  달성 지표(phase0 expected_outcome): 한 학급 기준 주당 학생 1인당 바이브 코딩 세션
  ≥ 1회, 타인 결과물 플레이·리뷰 ≥ 3회, Sonnet 쿼터 잉여분의 60% 이상이 학생
  세션으로 소비, 리뷰(별점·댓글) 충실도 측정 가능 상태.

constraints:
  # phase0 request.json known_constraints (9건)
  - "디바이스: 갤럭시 탭 S6 Lite 기준 — tablet-performance §2 공통 + §2a 격자 + §2b 0-iframe 예산 교차 준수 (iframe LRU 3개 상한, 카탈로그 iframe 0, 모달 iframe 1개, 번들 <500KB gzip, TTI <3s)"
  - "LLM 모델: Claude Sonnet 전용. Haiku·Opus 다운그레이드·교체 금지 (잉여 쿼터 소진이 동기 — 전제 위반)"
  - "실행 환경: Aura-board 생태계 내부 기능. 외부 별도 앱·별도 도메인 신설 금지. padlet/ 폴더는 읽기 전용 — 구현은 handoff 이후"
  - "운영 단위: 학급(교사 1인 관찰 범위). 전교·전사 확장은 v2+"
  - "프롬프트·결과물 모더레이션 필수 — 초중등 대상 AI 생성물 욕설·폭력·개인정보 노출 대비"
  - "Tier 정합성: Seed 2 요금제 — Free 접근 불가, Pro 전용(학급 풀 150만/일, 학생 4.5만/일), 학교 플랜은 v2+"
  - "결과물 형식: 브라우저 즉시 실행 가능해야 함 — 단일 HTML + inline JS/CSS + 외부 CDN 화이트리스트(jsdelivr·cdnjs·unpkg). 빌드 단계·외부 호스팅·WASM 업로드 금지"
  - "보안 격리: 학생 생성 JS가 타 학생 세션·쿠키·부모 도메인에 접근 불가 — cross-origin 서브도메인(`sandbox.aura-board.app`) + `<iframe sandbox=\"allow-scripts\">` (allow-same-origin 금지) + CSP `sandbox` 응답 헤더 이중 방어 + postMessage origin 화이트리스트"
  - "비용 상한: Sonnet 잉여 쿼터 — 학생 1인 일일 45K 토큰, 학급 일일 150만 토큰, 세션 타임아웃(활성 30분·입력 대기 5분)"

  # phase3 decisions.md §3 사용자 확정 대기 4건 — 기본값 적용, 런칭 전 사용자 확정 필요
  - "U-1 모더레이션 정책 초기값 = `teacher_approval_required` (기본값 적용, 사용자 확정 대기 — padlet phase0 request.json 작성 전 확정 필요)"
  - "U-2 리뷰 작성자 표시 = `named` (실명·번호. 기본값 적용, 사용자 확정 대기 — UX 와이어프레임 최종화 전)"
  - "U-3 리뷰 평가 시스템 = `stars_1_5` (5점 별점. 기본값 적용, 사용자 확정 대기 — UX 와이어프레임 최종화 전)"
  - "U-4 학급 간 공유 범위 = `crossClassroomVisible=false` (반 내부만. 기본값 적용, 사용자 확정 대기 — Seed 2 학교 플랜 v2 설계 전)"

  # phase3 decisions.md §2 파킹 분기 7건 — 본 시드 v1 편입 금지
  - "F-1 학생 신뢰 등급 시스템 (Student.vibeTrustTier) — v1 편입 금지, v1.5 또는 v2 파킹"
  - "F-2 '좋아요 화폐' StudentAccount 연동 (별점 5점 시 학급화폐 지급) — v1 편입 금지, 별도 시드 분리"
  - "F-3 학부모 자녀 작품 열람 (Seed 7 parent-viewer v2 매트릭스 행 추가) — 본 시드 phase5 integrate에서 parent-viewer-roadmap §5에 `vibe-arcade-child-view` 행 추가만 수행, 구현은 parent-viewer 시드 스코프"
  - "F-4 Remix 기능 v2 설계 (VibeProject.remixedFromId FK · 원작자 배지 · 리뷰 집계 분리) — v1 편입 금지, `VibeArcadeConfig.allowRemix=false` 기본"
  - "F-5 학급 Best Of 주간 자동 선정 + 학기말 포트폴리오 PDF (canva-assignment-pdf-merge 재활용) — v2 파킹"
  - "F-6 Pyodide Python 보드 분리 (`vibe-arcade-python` 별도 layout · 성능 예산 분리) — v1 편입 금지"
  - "F-7 스쿨마스터 2026 연동 (교사 대시보드 학생 명단·출석) — 본 시드 스코프 밖, 관찰 가치만 기록"

  # phase2 D-1~D-8 고정 전제 (재논의 금지)
  - "D-1 Aura-board 내부 자체 구현 (외부 플랫폼 임베드 전면 기각)"
  - "D-2 Claude Artifacts 패턴 — 학생 결과물 = 단일 HTML 문자열 1개"
  - "D-3 샌드박스 격리 이중 방어 (서브도메인 + iframe sandbox + CSP header + postMessage)"
  - "D-4 Board.layout=`vibe-arcade` enum 확장 (신규 BoardType 금지, Seed 3·6·11·12 관례 승계)"
  - "D-5 Classroom·Student·User·BoardMember·Section 재사용 (신규 유저·조직 엔티티 0)"
  - "D-6 Claude Sonnet API 호출 주체 = Aura 서버 (교사 계정 API Key 서버 DB 보관, 학생 세션은 서버 프록시)"
  - "D-7 Seed 12 LLM 프로바이더 추상화에 `anthropic-sonnet.ts` provider 1개 추가"
  - "D-8 Tier 게이팅 — Pro 전용 + `FeatureFlag.vibeArcadeGate` 런칭 플래그"

