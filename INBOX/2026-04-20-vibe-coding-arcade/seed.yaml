    - "R-2 부적절·폭력·성인 콘텐츠 다층 방어 — (a) Anthropic input classifier (b) 서버 프롬프트 필터 — 금칙어·개인정보 regex·금지 주제 화이트리스트 (c) 교사 승인 게이트(pending_review 기본) (d) 사후 학생 신고 → flagged 전환"
    - "R-3 쿼터 독식 방지 — perStudentDailyTokenCap + classroomDailyTokenPool + 세션 타임아웃(활성 30분·입력 대기 5분) + 교사 대시보드 실시간 모니터"
    - "R-4 저작권 — v1은 저작 가이드 팝업 1회 노출 + 프롬프트 사전 안내 '특정 상용 게임 이름 금지'. 기술적 감지(simhash · Scratch DB 대조)는 v1.5+ 파킹"
    - "R-5 개인정보 자동 스캔 — gongmun-assistant `privacy.py` 패턴 재활용 (전화번호·주민번호·한글 성명 5자 이내 regex) + 프롬프트 사전 스캔 + 게시 시점 HTML 추가 스캔 + 교사 승인 게이트가 최종 방어선 + 이미지 첨부 기능 자체 없음"
    - "R-7 교사 부담 완화 — 자동 1차 필터(Anthropic refusal + 서버 금칙어 → auto reject) + 신고받은 건 상단 정렬 + 키보드 단축키 A/R. ML 자동 분류는 v1.5+ 파킹"
    - "R-8 API 키 유출 방지 — env 보관 금지 + DB 암호화 + 서버 프록시 전용(클라 직접 호출 금지) + 학생별 레이트 limit + 일일 비정상 소비 Slack 경보"
    - "R-9 학생 데이터 프라이버시 — 7일 미활성 자동 익명화 + Free 1학기/Pro 학년 보존 + 자동 하드 삭제 cron (Seed 12 관례 승계)"
    - "R-10 리뷰 악성 사용 — 신고 3건 auto-hidden + 욕설 regex 차단 + reviewAuthorDisplay=named 기본(실명 책임) + 교사 대시보드 리뷰 탭"
    - "R-11 외부 도메인 로드 차단 — CSP `frame-src 'none'` 강제 + 서버 파서 `<iframe>·<object>·<embed>` 블랙리스트 + 외부 CDN 화이트리스트(jsdelivr·cdnjs·unpkg, HTTP-only, SRI 필수)"
    # 감사·로그
    - "교사 대시보드 프롬프트 로그 감사 뷰 — VibeSession.messages 금칙어 매치 필터링 + 학생별 세션 그룹핑 + 대화 전체 CSV 다운로드 (교육청 감사 요청 대응)"

ontology_schema:
  new_entities:
    - VibeArcadeConfig: |
        // Board(layout="vibe-arcade") 1:1 확장 설정.
        // Board 테이블 bloat 회피 — Seed 11이 Board에 3필드 얹은 대신 본 시드는 분리.
        model VibeArcadeConfig {
          boardId                 String   @id
          // "teacher_approval_required"(v1 기본) | "auto_publish" | "hybrid_trusted"(v1.5)
          moderationPolicy        String   @default("teacher_approval_required")
          // 학생 1인 일일 Sonnet 토큰 상한(IN+OUT). null = 학급 풀 공유만
          perStudentDailyTokenCap Int?     @default(45000)
          // 학급 전체 일일 토큰 풀. 0 = vibe-arcade 비활성(긴급 정지)
          classroomDailyTokenPool Int      @default(1500000)
          // U-4 학급 간 공유 (반 내부만 v1 기본)
          crossClassroomVisible   Boolean  @default(false)
          // U-2 "named" | "anonymous" | "hidden_to_peer"
          reviewAuthorDisplay     String   @default("named")
          // U-3 "stars_1_5" | "thumbs" | "emoji_5"(v2)
          reviewRatingSystem      String   @default("stars_1_5")
          // F-4 v1은 false 고정
          allowRemix              Boolean  @default(false)
          createdAt               DateTime @default(now())
          updatedAt               DateTime @updatedAt

          board Board @relation(fields: [boardId], references: [id], onDelete: Cascade)
        }
    - VibeProject: |
        // 학생 제작 결과물 (단일 HTML 아티팩트)
        model VibeProject {
          id                String    @id @default(cuid())
          boardId           String
          classroomId       String    // 비정규화 (학급 스코프 빠른 스캔)
          authorStudentId   String
          title             String
          description       String    @default("")  // ≤500자
          htmlContent       String    // 단일 HTML 원문. 서빙 시 CSP sandbox 헤더 부착
          thumbnailUrl      String?   // 서버 Playwright headless 160×120 WebP
          // 고정 태그 5종 중 1개: "게임"|"퀴즈"|"시뮬"|"아트"|"기타" (JSON 배열)
          tags              String    @default("[]")
          // "draft"|"pending_review"|"approved"|"rejected"|"flagged"|"hidden"
          moderationStatus  String    @default("draft")
          moderationNote    String?   // ≤300자
          approvedAt        DateTime?
          approvedById      String?   // Teacher User.id
          rejectedAt        DateTime?
          rejectedById      String?
          // 집계 비정규화 필드
          playCount         Int       @default(0)
          uniquePlayCount   Int       @default(0)
          reviewCount       Int       @default(0)
          ratingAvg         Float?
          version           Int       @default(1)  // 재제출 시 증가
          createdAt         DateTime  @default(now())
          updatedAt         DateTime  @updatedAt

          board        Board             @relation(fields: [boardId], references: [id], onDelete: Cascade)
          author       Student           @relation("VibeProjectAuthor", fields: [authorStudentId], references: [id], onDelete: Restrict)
          sessions     VibeSession[]
          reviews      VibeReview[]
          playSessions VibePlaySession[]

          @@index([boardId, moderationStatus])
          @@index([classroomId, moderationStatus, createdAt])
          @@index([authorStudentId])
        }
    - VibeSession: |
        // Sonnet과의 바이브 코딩 대화 세션 1건 (Claude Messages API 포맷)
        model VibeSession {
          id            String       @id @default(cuid())
          projectId     String?      // null = 아직 프로젝트 저장 전
          studentId     String
          classroomId   String       // 비정규화 (쿼터 스캔)
          messages      Json         // [{role, content, createdAt}]
          tokensIn      Int          @default(0)
          tokensOut     Int          @default(0)
          // "active"|"completed"|"abandoned"|"failed"
          status        String       @default("active")
          startedAt     DateTime     @default(now())
          endedAt       DateTime?
          refusalCount  Int          @default(0)  // Anthropic stop_reason="refusal"

          project VibeProject? @relation(fields: [projectId], references: [id], onDelete: SetNull)
          student Student      @relation("VibeSessionAuthor", fields: [studentId], references: [id], onDelete: Cascade)

          @@index([projectId])
          @@index([studentId, startedAt])
          @@index([classroomId, startedAt])
        }
    - VibeReview: |
        // 소비자 학생의 리뷰 (Steam-like)
        model VibeReview {
          id                String   @id @default(cuid())
          projectId         String
          reviewerStudentId String
          // 1-5 별점. reviewRatingSystem="thumbs"면 1 또는 5만 허용
          rating            Int
          comment           String   @default("")
          // "visible"|"hidden_by_teacher"|"flagged"
          moderationStatus  String   @default("visible")
          flagCount         Int      @default(0)  // 임계 3 → 자동 hidden
          createdAt         DateTime @default(now())
          updatedAt         DateTime @updatedAt

          project  VibeProject @relation(fields: [projectId], references: [id], onDelete: Cascade)
          reviewer Student     @relation("VibeReviewer", fields: [reviewerStudentId], references: [id], onDelete: Cascade)

          @@unique([projectId, reviewerStudentId])  // 학생 1인 1리뷰
          @@index([projectId])
          @@index([reviewerStudentId])
        }
    - VibePlaySession: |
        // 소비자 플레이 이벤트 (itch.io "things to rate" 독려용 원장)
        model VibePlaySession {
          id            String    @id @default(cuid())
          projectId     String
          studentId     String
          startedAt     DateTime  @default(now())
          endedAt       DateTime?
          completed     Boolean   @default(false)  // iframe postMessage "완료" 수신
          reportedScore Int?      // 게임 로직 신뢰 X, 통계·랭킹용 참고

          project VibeProject @relation(fields: [projectId], references: [id], onDelete: Cascade)
          student Student     @relation("VibePlayer", fields: [studentId], references: [id], onDelete: Cascade)

          @@index([projectId, startedAt])
          @@index([studentId, startedAt])
        }
    - VibeQuotaLedger: |
        // Sonnet 토큰 사용 원장 — (classroomId, studentId?, date) 일별 rollup.
        // 교사 대시보드 쿼터 현황 · 공정 배분 판단.
        model VibeQuotaLedger {
          id            String   @id @default(cuid())
          classroomId   String
          studentId     String?  // null = 학급 합계 행
          date          DateTime // 자정 기준 날짜 (KST)
          tokensIn      Int      @default(0)
          tokensOut     Int      @default(0)
          sessionsCount Int      @default(0)
          createdAt     DateTime @default(now())
          updatedAt     DateTime @updatedAt

          @@unique([classroomId, studentId, date])
          @@index([classroomId, date])
          @@index([studentId, date])
        }
  modified_entities:
    - Board:
        added_enum: "`layout` 주석에 `\"vibe-arcade\"` 추가 (기존 freeform/grid/stream/columns/assignment/quiz/plant-roadmap/event-signup/drawing/breakout/assessment 유지). 역관계 `vibeArcadeConfig VibeArcadeConfig?` + `vibeProjects VibeProject[]` 추가"
    - Student:
        added_relations: "역관계 4개 추가 — vibeProjectsAuthored (VibeProjectAuthor), vibeSessions (VibeSessionAuthor), vibeReviews (VibeReviewer), vibePlaySessions (VibePlayer). 신규 필드 0"
  entity_count_summary:
    new: 6
    modified_enum: 1  # Board.layout
    modified_relations_only: 2  # Board·Student 역관계 추가
    reused: ["User", "Classroom", "BoardMember", "Section(미사용)", "FeatureFlag.vibeArcadeGate"]

related_seeds:
  - seed: "Seed 2 (Tier 매트릭스 · Sonnet 쿼터 배분)"
    relation: "Free 접근 불가 · Pro 전용 · 학교 플랜 v2+ 게이팅 승계. 교사 계정 잉여 Sonnet 쿼터 → 학급 풀 → 학생 개인 상한 3단 배분 구조는 Seed 2 요금제 위에 얹음"
  - seed: "Seed 5 (iframe LRU 3개 · 탭 S6 Lite 예산)"
    relation: "카탈로그 iframe 0 · 모달 iframe 1 · LRU 3개 상한 재사용. 썸네일 160×120 WebP + lazy 로드 + IntersectionObserver 패턴 승계"
  - seed: "Seed 11 (assignment-board Board.layout 확장 패턴)"
    relation: "`Board.layout=\"vibe-arcade\"` enum 확장 · FeatureFlag 런칭 플래그 · 전체화면 모달 UX · 서버 썸네일 리사이즈 · Pro tier 게이팅 패턴 차용. 코드 공유는 미미"
  - seed: "Seed 12 (LLM provider 추상화 — anthropic-sonnet 추가)"
    relation: "`src/lib/llm/providers/anthropic-sonnet.ts` 1개 provider 추가. IndexedDB autosave 패턴 · Pro tier FeatureFlag · 감사 로그 보존 관례(Free 1학기/Pro 학년) 승계"
  - seed: "Seed 7 v2 (parent-viewer — F-3 매트릭스 행 추가)"
    relation: "본 시드 phase5 integrate 단계에서 `plans/parent-viewer-roadmap.md` §5 매트릭스에 `vibe-arcade-child-view` 행 추가만 수행. 실제 학부모 UI 구현은 parent-viewer 시드 스코프"
  - seed: "ideas-parking-lot.md#게임-제작-보드-마인크래프트-느낌 (V1 MakeCode Arcade 임베드안)"
    relation: "본 시드가 슈퍼시드 후보. phase7 dispatcher가 parking → archive 이동 마킹 수행"

parking_branches:
  # phase3 decisions.md §2 F-1~F-7 전건
  - id: F-1
    title: 학생 신뢰 등급 시스템
    detail: "Q1 하이브리드 옵션(C) '첫 5개 승인 후 자동' 실현 위한 Student.vibeTrustTier ∈ {new, trusted, flagged} 필드. 교사 수동 지정 또는 자동(승인 10회+신고 0회). R-7 교사 부담 완화 후속. v1.5 또는 v2"
  - id: F-2
    title: "'좋아요 화폐' StudentAccount 연동"
    detail: "리뷰 별점 5점 → 작성 학생에게 학급화폐 N원 자동 지급. StudentAccount 시드와 통합. 별도 시드 또는 Seed 11 후속 시드로 분리"
  - id: F-3
    title: 학부모 자녀 작품 열람
    detail: "Seed 7 parent-viewer v2 매트릭스에 `vibe-arcade-child-view` 행 추가. 본 시드 phase5 integrate에서 parent-viewer-roadmap §5 수정만 수행"
  - id: F-4
    title: Remix 기능 v2 설계
    detail: "VibeProject.remixedFromId String? FK + 원작자 배지 '🔀 {원작자}의 작품을 리믹스' + 리뷰 집계 분리(원작자 vs 리믹서). v1은 allowRemix=false 고정"
  - id: F-5
    title: 학급 Best Of 주간 자동 선정 + 학기말 포트폴리오 PDF
    detail: "canva-assignment-pdf-merge 스킬 재활용. 주간 상위 3작품 자동 선정 + 학기말 학생별 포트폴리오 Canva 템플릿 Autofill → PDF. v2 파킹"
  - id: F-6
    title: Python(Pyodide) 보드 분리
    detail: "별도 layout `vibe-arcade-python` 신설 — 성능 예산 분리 관리(Pyodide ~10MB 로드). Python 교과 연계 피드백 누적 시 활성화. v2"
  - id: F-7
    title: 스쿨마스터 2026 연동
    detail: "교사 대시보드에서 학생 명단·출석 연동 가능성. 본 시드 스코프 밖. 관찰 가치만"

