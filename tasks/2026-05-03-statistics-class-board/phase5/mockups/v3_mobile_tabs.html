<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v3 — Mobile Tabs</title>
<style>
  :root {
    --bg: #f6f5f4; --surface: #ffffff; --text: rgba(0,0,0,0.95); --muted: #615d59; --faint: #a39e98;
    --accent: #0075de; --accent-bg: #f2f9ff; --border: rgba(0,0,0,0.1); --shadow: 0 4px 18px rgba(0,0,0,0.04); --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 10; }
  .topbar-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
  .tabs { display: flex; gap: 8px; overflow-x: auto; }
  .tab { padding: 8px 14px; border-radius: 999px; background: var(--bg); border: 1px solid var(--border); font-size: 13px; font-weight: 600; color: var(--muted); white-space: nowrap; cursor: pointer; }
  .tab.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
  .tab.done { background: #e8f5e9; color: #2e7d32; border-color: #b8dfc7; }
  .tab.locked { opacity: 0.4; }
  .main { padding: 16px; max-width: 640px; margin: 0 auto; }
  .banner { background: var(--accent-bg); color: var(--accent); padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; font-size: 13px; font-weight: 600; }
  .panel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
  .panel h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .panel .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .accordion { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .acc-header { padding: 12px 14px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; font-size: 14px; }
  .acc-body { padding: 14px; border-top: 1px solid var(--border); }
  .acc-body textarea { width: 100%; min-height: 70px; border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-family: inherit; font-size: 14px; }
  .hint { font-size: 12px; color: var(--faint); margin-top: 6px; }
  .actions { display: flex; gap: 8px; margin-top: 18px; }
  button { flex: 1; padding: 12px; border-radius: 4px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-title">📊 통계활용대회 — 팀 3</div>
    <div class="tabs">
      <span class="tab done">1 ✓</span>
      <span class="tab active">2</span>
      <span class="tab locked">3 🔒</span>
      <span class="tab locked">4 🔒</span>
      <span class="tab locked">5 🔒</span>
      <span class="tab locked">···</span>
    </div>
  </div>
  <main class="main">
    <div class="banner">미션 2를 하고 있어요 — 질문 사다리를 만들어 보세요!</div>
    <div class="panel">
      <h3>미션 2. 질문 사다리</h3>
      <p class="subtitle">찬반은 마지막 보스!</p>
      <div class="accordion">
        <div class="acc-header">1층. 경험 <span>▼</span></div>
        <div class="acc-body">
          <textarea placeholder="노키즈존이라는 말을 들어본 적이 있나요?"></textarea>
          <div class="hint">💡 예시: 가족과 함께 가려던 곳이 노키즈존이라 들어가지 못한 경험이 있나요?</div>
          <button class="btn-secondary" style="margin-top:10px; flex:0 0 auto; padding:8px 14px;">AI 조언</button>
        </div>
      </div>
      <div class="accordion">
        <div class="acc-header">2층. 현황 <span>▶</span></div>
      </div>
      <div class="accordion">
        <div class="acc-header">3층. 이유 <span>▶</span></div>
      </div>
      <div class="actions">
        <button class="btn-secondary">저장</button>
        <button class="btn-primary">완료</button>
      </div>
    </div>
  </main>
</body>
</html>
