<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--color-bg); font-family: var(--font-body); display: flex; gap: 22px; flex-wrap: wrap; align-items: flex-start; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .emoji { font-size: 40px; line-height: 1; }
  .cap { font-size: 12px; color: var(--color-text-muted); }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-faint); }
  .uni { font-size: 32px; line-height: 1; color: var(--color-text); font-weight: 500; }
</style></head>
<body>
  <div class="item"><span class="emoji">🎯</span><span class="cap">freeform</span></div>
  <div class="item"><span class="emoji">🔲</span><span class="cap">grid</span></div>
  <div class="item"><span class="emoji">📜</span><span class="cap">stream</span></div>
  <div class="item"><span class="emoji">📊</span><span class="cap">columns</span></div>
  <div class="item"><span class="emoji">📋</span><span class="cap">assignment</span></div>
  <div class="item"><span class="emoji">🎮</span><span class="cap">quiz</span></div>
  <div class="item"><span class="uni">→</span><span class="mono">U+2192</span></div>
  <div class="item"><span class="uni">+</span><span class="mono">U+002B</span></div>
  <div class="item"><span class="uni">···</span><span class="mono">U+00B7·3</span></div>
  <div class="item"><span class="uni">×</span><span class="mono">U+00D7</span></div>
</body></html>
