<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--color-bg); font-family: var(--font-body); display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .mark { width: 56px; height: 56px; border-radius: 14px; background: #0075de; color: #fff; font-size: 28px; font-weight: 800; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,117,222,0.25); letter-spacing: -0.5px; }
  .wm { font-weight: 700; letter-spacing: -0.5px; font-size: 28px; color: rgba(0,0,0,0.95); }
  .small .mark { width: 32px; height: 32px; border-radius: 8px; font-size: 16px; }
  .small .wm { font-size: 18px; }
  .mono { width: 56px; height: 56px; border-radius: 14px; background: rgba(0,0,0,0.95); color: #fff; font-size: 28px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
</style></head>
<body>
  <div class="lockup"><div class="mark">A</div><div class="wm">Aura-board</div></div>
  <div class="lockup small"><div class="mark">A</div><div class="wm">Aura-board</div></div>
  <div class="lockup"><div class="mono">A</div></div>
</body></html>
