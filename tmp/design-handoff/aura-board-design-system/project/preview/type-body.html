<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--color-bg-alt); font-family: var(--font-body); color: var(--color-text); }
  .row { display: flex; flex-direction: column; gap: 10px; }
  .item { display: flex; align-items: baseline; gap: 16px; }
  .label { width: 90px; color: var(--color-text-muted); font-size: 11px; font-family: var(--font-mono); }
  .section { font-size: 15px; font-weight: 700; letter-spacing: -0.15px; }
  .body { font-size: 15px; font-weight: 400; }
  .label-t { font-size: 13px; font-weight: 600; color: var(--color-text-muted); }
  .badge { font-size: 12px; font-weight: 600; letter-spacing: 0.125px; }
  .micro { font-size: 11px; font-weight: 600; letter-spacing: 0.1px; color: var(--color-text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="item"><span class="label">section · 15/700</span><span class="section">공유된 보드</span></div>
    <div class="item"><span class="label">body · 15/400</span><span class="body">로그인에 실패했습니다. 코드를 다시 확인해 주세요.</span></div>
    <div class="item"><span class="label">label · 13/600</span><span class="label-t">학급 이름</span></div>
    <div class="item"><span class="label">badge · 12/600</span><span class="badge">제출됨</span></div>
    <div class="item"><span class="label">micro · 11/600</span><span class="micro">D-3 남음</span></div>
  </div>
</body></html>
