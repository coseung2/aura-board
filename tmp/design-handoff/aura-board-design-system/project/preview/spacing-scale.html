<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--color-bg-alt); font-family: var(--font-body); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--color-accent-tinted-bg); border: 1px dashed var(--color-accent); border-radius: 4px; }
  .cap { font-size: 11px; color: var(--color-text-muted); font-family: var(--font-mono); }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="box" style="width:4px;height:4px"></div><div class="cap">4</div></div>
    <div class="cell"><div class="box" style="width:8px;height:8px"></div><div class="cap">8</div></div>
    <div class="cell"><div class="box" style="width:12px;height:12px"></div><div class="cap">12</div></div>
    <div class="cell"><div class="box" style="width:16px;height:16px"></div><div class="cap">16</div></div>
    <div class="cell"><div class="box" style="width:20px;height:20px"></div><div class="cap">20</div></div>
    <div class="cell"><div class="box" style="width:24px;height:24px"></div><div class="cap">24</div></div>
    <div class="cell"><div class="box" style="width:32px;height:32px"></div><div class="cap">32</div></div>
    <div class="cell"><div class="box" style="width:40px;height:40px"></div><div class="cap">40</div></div>
    <div class="cell"><div class="box" style="width:48px;height:48px"></div><div class="cap">48</div></div>
  </div>
</body></html>
