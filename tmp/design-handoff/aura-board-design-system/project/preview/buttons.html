<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--color-bg); font-family: var(--font-body); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  button { font-family: inherit; }
  .btn-primary { background: #0075de; color: #fff; border: none; border-radius: 4px; padding: 9px 20px; font-weight: 600; font-size: 14px; cursor: pointer; }
  .btn-primary:hover { background: #005bab; }
  .btn-primary-lg { padding: 12px 24px; font-size: 15px; box-shadow: 0 6px 20px rgba(0,117,222,0.25); }
  .btn-secondary { background: transparent; color: rgba(0,0,0,0.95); border: 1px solid rgba(0,0,0,0.1); border-radius: 4px; padding: 9px 20px; font-weight: 500; font-size: 14px; cursor: pointer; }
  .btn-danger { background: #c62828; color: #fff; border: none; border-radius: 4px; padding: 9px 20px; font-weight: 600; font-size: 14px; cursor: pointer; }
  .btn-ghost { background: transparent; color: #0075de; border: none; padding: 9px 14px; font-weight: 500; font-size: 14px; cursor: pointer; }
  .btn-disabled { opacity: .45; cursor: not-allowed; }
</style></head>
<body>
  <button class="btn-primary">로그인</button>
  <button class="btn-primary btn-primary-lg">새 보드 만들기</button>
  <button class="btn-secondary">취소</button>
  <button class="btn-danger">삭제</button>
  <button class="btn-ghost">학급 관리 →</button>
  <button class="btn-primary btn-disabled">확인 중...</button>
</body></html>
