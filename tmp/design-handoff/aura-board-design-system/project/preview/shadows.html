<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--color-bg); font-family: var(--font-body); }
  .row { display: flex; gap: 22px; align-items: center; }
  .cell { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .box { width: 110px; height: 80px; background: var(--color-surface); border: var(--border-card); border-radius: 12px; }
  .s-card { box-shadow:
    rgba(0,0,0,0.04) 0 4px 18px,
    rgba(0,0,0,0.027) 0 2.025px 7.85px,
    rgba(0,0,0,0.02) 0 0.8px 2.93px,
    rgba(0,0,0,0.01) 0 0.175px 1.04px; }
  .s-hover { box-shadow:
    rgba(0,0,0,0.06) 0 12px 34px,
    rgba(0,0,0,0.04) 0 4px 14px; }
  .s-accent { box-shadow: 0 6px 20px rgba(0,117,222,0.25); background: var(--color-accent); border: none; }
  .cap { font-size: 11px; font-family: var(--font-mono); color: var(--color-text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="box s-card"></div><div class="cap">card · resting</div></div>
    <div class="cell"><div class="box s-hover"></div><div class="cap">card · hover</div></div>
    <div class="cell"><div class="box s-accent"></div><div class="cap">accent CTA</div></div>
  </div>
</body></html>
