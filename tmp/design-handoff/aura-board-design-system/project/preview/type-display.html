<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--color-bg-alt); font-family: var(--font-body); color: var(--color-text); }
  .row { display: flex; flex-direction: column; gap: 10px; }
  .item { display: flex; align-items: baseline; gap: 16px; }
  .label { width: 90px; color: var(--color-text-muted); font-size: 11px; font-family: var(--font-mono); }
  .d32 { font-family: var(--font-display); font-size: 32px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.15; }
  .d26 { font-family: var(--font-display); font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .d20 { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .d16 { font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: -0.25px; }
</style></head>
<body>
  <div class="row">
    <div class="item"><span class="label">h1 · 32/700</span><span class="d32">새 보드 만들기</span></div>
    <div class="item"><span class="label">display · 26/700</span><span class="d26">학급 관리</span></div>
    <div class="item"><span class="label">title · 20/700</span><span class="d20">이번 주 과제</span></div>
    <div class="item"><span class="label">subtitle · 16/700</span><span class="d16">제출된 카드</span></div>
  </div>
</body></html>
