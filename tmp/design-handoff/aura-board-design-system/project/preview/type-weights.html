<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--color-bg-alt); font-family: var(--font-body); color: var(--color-text); }
  .stack { display: grid; grid-template-columns: 60px 1fr; gap: 6px 16px; align-items: center; }
  .w { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); text-align: right; }
  .s { font-family: var(--font-display); font-size: 20px; letter-spacing: -0.3px; }
</style></head>
<body>
  <div class="stack">
    <span class="w">400</span><span class="s" style="font-weight:400">학급을 만들어 학생을 초대하세요</span>
    <span class="w">500</span><span class="s" style="font-weight:500">학급을 만들어 학생을 초대하세요</span>
    <span class="w">600</span><span class="s" style="font-weight:600">학급을 만들어 학생을 초대하세요</span>
    <span class="w">700</span><span class="s" style="font-weight:700">학급을 만들어 학생을 초대하세요</span>
    <span class="w">800</span><span class="s" style="font-weight:800">학급을 만들어 학생을 초대하세요</span>
  </div>
</body></html>
