<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--color-bg-alt); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw {
    width: 100px; height: 88px; border-radius: 12px;
    border: var(--border-card); box-shadow: var(--shadow-card);
    padding: 10px; display: flex; flex-direction: column; justify-content: flex-end;
    font-family: var(--font-body);
  }
  .sw .lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.1px; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; opacity: .75; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#f6f5f4"><div class="lbl">bg</div><div class="hex">#F6F5F4</div></div>
    <div class="sw" style="background:#ffffff"><div class="lbl">surface</div><div class="hex">#FFFFFF</div></div>
    <div class="sw" style="background:rgba(0,0,0,0.05)"><div class="lbl">surface-alt</div><div class="hex">0 / 0.05</div></div>
    <div class="sw" style="background:rgba(0,0,0,0.95);color:#fff"><div class="lbl">text</div><div class="hex">0 / 0.95</div></div>
    <div class="sw" style="background:#615d59;color:#fff"><div class="lbl">text-muted</div><div class="hex">#615D59</div></div>
    <div class="sw" style="background:#a39e98;color:#fff"><div class="lbl">text-faint</div><div class="hex">#A39E98</div></div>
  </div>
</body></html>
