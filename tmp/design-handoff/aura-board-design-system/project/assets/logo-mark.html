<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><title>Logo mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; display: flex; align-items: center; gap: 20px; }
  .mark {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--color-accent); color: #fff;
    font-family: var(--font-display); font-size: 28px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-accent);
  }
  .wordmark {
    font-family: var(--font-display); font-weight: 700;
    letter-spacing: var(--font-display-tracking); font-size: 28px;
  }
</style></head>
<body>
  <div class="mark">A</div>
  <div class="wordmark">Aura-board</div>
</body></html>
