plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.auraboardhealthconnect'
version = '1.0.0'

android {
  namespace "expo.modules.auraboardhealthconnect"
  defaultConfig {
    minSdk 26
    versionCode 1
    versionName "1.0.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "androidx.health.connect:connect-client:1.1.0"
}
